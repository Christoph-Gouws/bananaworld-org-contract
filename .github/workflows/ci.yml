name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: org_contract_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm test:integration
        env:
          # A THROWAWAY service container — never a shared database (ENV-DEV-002).
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/org_contract_test
          STATION_PIN_LOOKUP_SECRET: ci-test-pin-lookup-secret
          SUPABASE_JWT_SECRET: ci-test-station-token-secret
